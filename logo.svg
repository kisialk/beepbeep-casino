<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-label="Beep Beep Casino">
  <defs>
    <linearGradient id="bbc-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="55%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff7a00"/>
    </linearGradient>
    <filter id="bbc-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="320" height="64" rx="18" fill="#0b0b0b"/>
  <rect x="3" y="3" width="314" height="58" rx="16" fill="none" stroke="url(#bbc-fill)" stroke-width="2" opacity="0.85"/>
  <text x="160" y="42" text-anchor="middle" font-family="Segoe UI, Arial Black, Impact, sans-serif" font-size="22" font-weight="800" fill="url(#bbc-fill)" stroke="#1a0a00" stroke-width="3.2" paint-order="stroke fill" filter="url(#bbc-glow)">Beep Beep Casino</text>
</svg>
